worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format agent '$remote_addr - $request_method $uri $status '
                     '$body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log agent;
    error_log /var/log/nginx/error.log warn;

    # Limit request bursts before they reach model and database resources.
    # 在请求到达模型和数据库资源之前限制突发流量。
    limit_req_zone $binary_remote_addr zone=agent_api:10m rate=20r/s;

    upstream agent_backend {
        server agent:9003;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 100m;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;

        location = /api/v1/health {
            proxy_pass http://agent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # WebSocket connections need protocol upgrade and long read timeouts.
        # WebSocket 连接需要协议升级，并允许长时间等待 Agent 实时输出。
        location /api/v1/agents/ws {
            limit_req zone=agent_api burst=10 nodelay;
            proxy_pass http://agent_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location / {
            limit_req zone=agent_api burst=40 nodelay;
            proxy_pass http://agent_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
